<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bank Deposit</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="bank-header">
      <h1>Deposit Money</h1>
      <p>Secure Online Deposit Service</p>
    </div>

    <form id="depositForm">
      <div class="form-group">
        <label for="userId">Account Number</label>
        <input type="number" id="userId" placeholder="Enter your account number" required>
      </div>

      <div id="currentBalance">
        Loading balance...
      </div>

      <div class="form-group">
        <label for="amount">Amount to Deposit</label>
        <input type="number" id="amount" placeholder="Enter amount" required>
      </div>

      <button type="submit">Deposit Now</button>
    </form>

    <div id="result"></div>

    <div class="back-button">
      <a href="/">Back to Home</a>
    </div>
  </div>

  <script src="deposit.js"></script>
</body>
</html>
